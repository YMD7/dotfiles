set -g mouse on

# ステータスラインの色をホスト名で切り替え
if-shell '[ "$(hostname)" = "EDOPC-087.local" ]' \
  'set -g status-style "bg=#1e2e74,fg=#7b88a1"; \
   set -g status-left-style "bg=#1e2e74,fg=#7b88a1"; \
   set -g status-right-style "bg=#1e2e74,fg=#7b88a1"; \
   set -g window-status-style "bg=#1e2e74,fg=#7b88a1"; \
   set -g window-status-current-style "bg=#1e2e74,fg=#89b4fa,bold"; \
   set -g message-style "bg=#1e2e74,fg=#cdd6f4"; \
   set -g status-left " [#S] "; \
   set -g window-status-format ""; \
   set -g window-status-current-format ""; \
   set -g status-right " %Y/%m/%d %H:%M "'

if-shell '[ "$(hostname)" = "YMD-MacBook-Air.local" ]' \
  'set -g status-style "bg=#741e1e,fg=#a17b7b"; \
   set -g status-left-style "bg=#741e1e,fg=#a17b7b"; \
   set -g status-right-style "bg=#741e1e,fg=#a17b7b"; \
   set -g window-status-style "bg=#741e1e,fg=#a17b7b"; \
   set -g window-status-current-style "bg=#741e1e,fg=#fa8989,bold"; \
   set -g message-style "bg=#741e1e,fg=#f4cdcd"; \
   set -g status-left " [#S] "; \
   set -g window-status-format ""; \
   set -g window-status-current-format ""; \
   set -g status-right " %Y/%m/%d %H:%M "'
