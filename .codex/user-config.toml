model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
web_search = "cached"

[features]
hooks = true

[sandbox_workspace_write]
network_access = false

[profiles.cloudflare-op]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
allow_login_shell = false
web_search = "cached"

[profiles.cloudflare-op.sandbox_workspace_write]
network_access = true

[profiles.cloudflare-op.shell_environment_policy]
inherit = "core"
ignore_default_excludes = true
include_only = [
  "HOME",
  "PATH",
  "PNPM_HOME",
  "TMPDIR",
  "USER",
  "XDG_CACHE_HOME",
  "XDG_CONFIG_HOME",
  "XDG_DATA_HOME",
  "__CF_USER_TEXT_ENCODING",
  "OP_SERVICE_ACCOUNT_TOKEN",
]
exclude = [
  "OP_CONNECT_HOST",
  "OP_CONNECT_TOKEN",
]

[auto_review]
policy = """
Deny requests that:
- delete broad filesystem targets such as /, ~, $HOME, .., .git, or large glob
patterns
- modify files outside the current project unless explicitly requested
- bypass security hooks or checks, including --no-verify, core.hooksPath changes,
or disabling hook tools
- print, copy, upload, or exfiltrate secrets
- run network access to unknown hosts without clear user intent

Allow normal project-local development work.
Allow GitHub/GitLab-related development network actions when the command intent
is clear, such as git fetch, git pull, git push, gh pr/issue/check commands, and
glab equivalents.

Allow Butty Cloudflare tooling secret injection only when all conditions hold:
- Codex is launched with the `cloudflare-op` profile and the command is scoped
  to the active Butty worktree
- `OP_SERVICE_ACCOUNT_TOKEN` is inherited from the parent process, never read
  from Keychain, `.env`, shell history, or command substitution
- `OP_CONNECT_HOST` and `OP_CONNECT_TOKEN` are absent
- 1Password access is via `op run --env-file=infra/cloudflare/.env.*.template
  -- pnpm cf:*` or the repository wrapper `pnpm cf:op:run --template
  <purpose> -- pnpm cf:*`
- the template path is under `infra/cloudflare/`, the purpose is `auth-check`,
  `deploy`, `logs`, or `smoke-debug-admin`, and output remains redacted
  JSON/audit output
- the command does not print environment variables, read raw secret values,
  write plaintext `.env.local` fallbacks, or pass secret values on the command
  line

Allow 1Password item scaffolding only for non-secret metadata in vault
`butty-dev` and item names prefixed with `cloudflare-`; secret field values
must be entered by a human in 1Password or injected by `op run`, not included
in shell commands or logs.
"""

[profiles.net]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[profiles.net.sandbox_workspace_write]
network_access = true

[profiles.readonly]
sandbox_mode = "read-only"
approval_policy = "never"

[projects."/Users/kyo/Dev/dotfiles"]
trust_level = "trusted"

[projects."/Users/kyo/Dev/butty"]
trust_level = "trusted"

[projects."/Users/kyo"]
trust_level = "trusted"

[projects."/Users/kyo/Dev/claude-plugins"]
trust_level = "trusted"

[notice]
hide_rate_limit_model_nudge = true
fast_default_opt_out = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[model_providers.openai-cli]
name = "OpenAI (CLI dev)"
base_url = "https://api.openai.com/v1"
wire_api = "responses"
env_key = "CODEX_API_KEY"
env_key_instructions = "Set CODEX_API_KEY env var (separate from Butty's OPENAI_API_KEY)"

[profiles.api]
model_provider = "openai-cli"

[tui]
status_line = [
  "model-with-reasoning",
  "project-root",
  "context-remaining",
  "git-branch",
  "five-hour-limit",
  "weekly-limit",
]

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."github@openai-curated"]
enabled = true

[hooks.state]

[hooks.state."/Users/kyo/Dev/butty/.codex/hooks.json:pre_tool_use:0:0"]
enabled = true
trusted_hash = "sha256:6a6e8f11fd7f3a312088903e7959579c01c83cff17fad224475f20ec09ae4b02"
